name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Check if tag matches __version__
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION_FROM_FILE=$(grep -Po '(?<=__version__ = ")[^"]*' pyaltibase/__init__.py)
          TAG_VERSION=${TAG_NAME#v}
          echo "Version from file: $VERSION_FROM_FILE"
          echo "Tag name: $TAG_NAME"
          echo "Version from tag: $TAG_VERSION"
          if [ "$VERSION_FROM_FILE" != "$TAG_VERSION" ]; then
            echo "::error ::Version in __init__.py ($VERSION_FROM_FILE) does not match git tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build distribution packages
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
