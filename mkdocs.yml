site_name: pyaltibase
site_description: "Unofficial Python DB-API 2.0 connector for Altibase"
site_url: https://yeongseon.github.io/pyaltibase/
repo_url: https://github.com/yeongseon/pyaltibase
edit_uri: edit/main/docs/
exclude_docs: README.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Connection Guide: connection.md
  - Reference:
      - API Reference: api.md
      - Type Mapping: types.md
      - Error Handling: errors.md
  - Architecture: architecture.md
  - Testing: testing.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite

plugins:
  - search

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/pyaltibase
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pyaltibase/
      name: PyPI

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-init.js
